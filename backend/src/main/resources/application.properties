spring.application.name=pedidos
spring.datasource.url=jdbc:sqlserver://localhost:1433;databaseName=pedidos;encrypt=true;trustServerCertificate=true;
spring.datasource.username=alandssl
spring.datasource.password=123456

spring.datasource.driver-class-name=com.microsoft.sqlserver.jdbc.SQLServerDriver

spring.jpa.database-platform=org.hibernate.dialect.SQLServerDialect
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true

# Aumentar o limite de upload de arquivos para 10MB
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=10MB
